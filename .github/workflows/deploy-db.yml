name: Deploy Database Migrations

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

env:
  PGPASSWORD: ${{ secrets.DB_PASS }}

jobs:
  deploy-migrations:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'production' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Validate database connection
        run: |
          psql -h "${{ secrets.DB_HOST }}" \
               -U "${{ secrets.DB_USER }}" \
               -d "${{ secrets.DB_NAME }}" \
               -c "SELECT 1;" > /dev/null 2>&1
          if [ $? -ne 0 ]; then
            echo "::error::Failed to connect to database. Check secrets configuration."
            exit 1
          fi
          echo "Database connection successful!"

      - name: Run migrations in order
        run: |
          MIGRATION_DIR="./migrations"
          for migration_file in $(ls -1 "$MIGRATION_DIR"/*.sql | sort); do
            echo "Running migration: $(basename $migration_file)"
            psql -h "${{ secrets.DB_HOST }}" \
                 -U "${{ secrets.DB_USER }}" \
                 -d "${{ secrets.DB_NAME }}" \
                 -f "$migration_file"
            if [ $? -ne 0 ]; then
              echo "::error::Migration failed: $(basename $migration_file)"
              exit 1
            fi
          done
          echo "All migrations completed successfully!"

      - name: Validate schema integrity
        run: |
          echo "Validating schema integrity..."
          
          # Check all tables exist
          TABLES=("users" "addresses" "categories" "brands" "products" "carts" "cart_items" "orders" "order_items" "payments")
          for table in "${TABLES[@]}"; do
            psql -h "${{ secrets.DB_HOST }}" \
                 -U "${{ secrets.DB_USER }}" \
                 -d "${{ secrets.DB_NAME }}" \
                 -c "SELECT COUNT(*) FROM $table;" > /dev/null 2>&1
            if [ $? -ne 0 ]; then
              echo "::error::Table validation failed: $table"
              exit 1
            fi
            echo "✓ Table '$table' exists and is accessible"
          done
          
          # Verify indexes exist
          INDEX_COUNT=$(psql -h "${{ secrets.DB_HOST }}" \
                        -U "${{ secrets.DB_USER }}" \
                        -d "${{ secrets.DB_NAME }}" \
                        -t -c "SELECT COUNT(*) FROM pg_indexes WHERE schemaname = 'public';")
          echo "✓ Total indexes created: $INDEX_COUNT"
          
          # Verify foreign key constraints
          FK_COUNT=$(psql -h "${{ secrets.DB_HOST }}" \
                     -U "${{ secrets.DB_USER }}" \
                     -d "${{ secrets.DB_NAME }}" \
                     -t -c "SELECT COUNT(*) FROM information_schema.table_constraints WHERE constraint_type = 'FOREIGN KEY' AND table_schema = 'public';")
          echo "✓ Foreign key constraints: $FK_COUNT"
          
          echo "Schema integrity validation passed!"

      - name: Deployment summary
        run: |
          echo "## 🚀 Database Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** ${{ github.event.inputs.environment || 'production' }}" >> $GITHUB_STEP_SUMMARY
          echo "**Database:** ${{ secrets.DB_NAME }} @ ${{ secrets.DB_HOST }}" >> $GITHUB_STEP_SUMMARY
          echo "**Deployed at:** $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Migrations Applied:" >> $GITHUB_STEP_SUMMARY
          ls -1 ./migrations/*.sql | while read file; do
            echo "- ✓ $(basename $file)" >> $GITHUB_STEP_SUMMARY
          done
